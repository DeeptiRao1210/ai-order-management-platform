server:
  port: 8083

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:mysql://localhost:3306/ai_order_management_order_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: VishnuVayu1282#
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  cloud:
    openfeign:
      client:
        config:

          inventory-service:
            connectTimeout: 2000
            readTimeout: 3000
            loggerLevel: basic

          payment-service:
            connectTimeout: 2000
            readTimeout: 5000
            loggerLevel: basic


inventory:
  service:
    url: http://localhost:8082

payment:
  service:
    url: http://localhost:8084


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka


resilience4j:
  circuitbreaker:
    configs:
      downstreamServiceDefault:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 10s
        permittedNumberOfCallsInHalfOpenState: 5
        waitDurationInOpenState: 10s
        automaticTransitionFromOpenToHalfOpenEnabled: true

    instances:
      inventoryServiceCircuitBreaker:
        baseConfig: downstreamServiceDefault

      paymentServiceCircuitBreaker:
        baseConfig: downstreamServiceDefault


management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - circuitbreakers
          - circuitbreakerevents

  endpoint:
    health:
      show-details: always

  health:
    circuitbreakers:
      enabled: true


logging:
  level:
    com.deepti.ecommerce.orderservice.client.InventoryClient: DEBUG
    com.deepti.ecommerce.orderservice.client.PaymentClient: DEBUG