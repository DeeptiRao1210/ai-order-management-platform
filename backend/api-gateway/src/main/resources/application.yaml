server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/products/**

            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/inventory/**

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
            
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**

            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**


management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: ${JWT_SECRET}
  