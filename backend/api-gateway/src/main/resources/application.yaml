server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/products/**

            - id: inventory-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/inventory/**

            - id: order-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/orders/**
            
            - id: payment-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/payments/**
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway